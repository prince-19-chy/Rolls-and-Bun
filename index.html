<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Embers Beneath</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
    color: white;
}
canvas { display: block; }
#textBox {
    position: absolute;
    bottom: 60px;
    width: 100%;
    text-align: center;
    font-size: 24px;
    opacity: 0;
    transition: opacity 2s;
    pointer-events: none;
}
#titleScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
button {
    padding: 10px 20px;
    background: black;
    border: 1px solid white;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="titleScreen">
    <h1>EMBERS BENEATH</h1>
    <p>Press Start. Stay in the light.</p>
    <button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>
<div id="textBox"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const textBox = document.getElementById("textBox");
const titleScreen = document.getElementById("titleScreen");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let layer = 0;
let ending = false;
let shake = 0;
let glitch = 0;
let fogOffset = 0;

const player = { x: canvas.width/2, y: canvas.height/2+120, size: 12, speed: 2.5 };
const fire = { x: canvas.width/2, y: canvas.height/2, size: 30, flicker: 0 };
const shadow = { x: 100, y: 100, visible: false };

const messages = [
    "You buried it here.",
    "It never stopped watching.",
    "You were not alone.",
    "The fire was never warmth."
];

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function startGame(){
    titleScreen.style.display = "none";
    initAudio();
    gameLoop();
}

function showText(msg){
    textBox.innerText = msg;
    textBox.style.opacity = 1;
    setTimeout(()=> textBox.style.opacity = 0, 4000);
}

function distance(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function update(){
    if(ending) return;

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    if(distance(player,fire) < 70 && keys[" "]){
        if(layer < 3){
            layer++;
            shake = layer === 3 ? 8 : 0;
            glitch = 20;
            shadow.visible = true;
            showText(messages[layer-1]);
        } else {
            triggerEnding();
        }
        keys[" "] = false;
    }

    fire.flicker = Math.random()*4;
    fogOffset += 0.2;

    shadow.x += (player.x - shadow.x) * 0.0015 * layer;
    shadow.y += (player.y - shadow.y) * 0.0015 * layer;

    if(glitch > 0) glitch--;
    if(shake > 0) shake *= 0.95;
}

function drawBackground(){
    ctx.fillStyle = layer === 0 ? "#0a1a0a" : "#050b05";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Trees
    ctx.fillStyle = "#102010";
    for(let i=0;i<50;i++){
        let x = (i*200)%canvas.width;
        ctx.fillRect(x, canvas.height/2 - 150, 20, 300);
    }

    // Fog
    ctx.fillStyle = "rgba(255,255,255,0.02)";
    for(let i=0;i<canvas.width;i+=100){
        ctx.fillRect(i + Math.sin((i+fogOffset)/50)*20,0,100,canvas.height);
    }
}

function drawFire(){
    if(layer >= 3) return;

    let size = fire.size - layer*6 + fire.flicker;
    let gradient = ctx.createRadialGradient(
        fire.x, fire.y, 0,
        fire.x, fire.y, size*3
    );
    gradient.addColorStop(0,"orange");
    gradient.addColorStop(1,"transparent");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(fire.x, fire.y, size*3, 0, Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle = "orange";
    ctx.arc(fire.x, fire.y, size, 0, Math.PI*2);
    ctx.fill();
}

function drawPlayer(){
    ctx.beginPath();
    ctx.fillStyle = "white";
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();
}

function drawShadow(){
    if(!shadow.visible) return;

    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.fillStyle = "black";
    ctx.arc(shadow.x, shadow.y, 25, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
}

function drawLighting(){
    ctx.fillStyle = "rgba(0,0,0,0.95)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let lightRadius = 180 - layer*30;

    let gradient = ctx.createRadialGradient(
        player.x, player.y, 20,
        player.x, player.y, lightRadius
    );
    gradient.addColorStop(0,"rgba(0,0,0,0)");
    gradient.addColorStop(1,"rgba(0,0,0,0.95)");

    ctx.globalCompositeOperation = "destination-out";
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(player.x, player.y, lightRadius, 0, Math.PI*2);
    ctx.fill();

    ctx.globalCompositeOperation = "source-over";
}

function drawGlitch(){
    if(glitch <= 0) return;
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    for(let i=0;i<20;i++){
        ctx.fillRect(Math.random()*canvas.width,
                     Math.random()*canvas.height,
                     200,2);
    }
}

function triggerEnding(){
    ending = true;
    showText("The fire goes out.");
    setTimeout(()=>{
        showText("You were always alone.");
    },4000);
}

function gameLoop(){
    ctx.save();

    if(shake>0){
        ctx.translate(
            (Math.random()-0.5)*shake,
            (Math.random()-0.5)*shake
        );
    }

    update();
    drawBackground();
    drawFire();
    drawShadow();
    drawPlayer();
    drawLighting();
    drawGlitch();

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

function initAudio(){
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    oscillator.type = "sine";

      <div class="order-group" data-status="Pending"></div>
      <div class="order-group" data-status="Preparing"></div>
      <div class="order-group" data-status="Ready"></div>
      <div class="order-group" data-status="Completed"></div>
    </div>

    <!-- admin panel -->
    <div id="adminPanel">
      <h2>Admin Panel</h2>
      <div class="form-group">
        <input type="text" id="adminItemName" placeholder="Item Name" />
      </div>
      <div class="form-group">
        <input type="text" id="adminItemPrice" placeholder="Price" />
      </div>
      <div class="form-group">
        <textarea id="adminItemDesc" placeholder="Description"></textarea>
      </div>
      <button id="adminAddBtn">Add Item</button>
      <div class="menu-list"></div>
    </div>

  </div>

  <script>
    // JavaScript logic sections
    (function(){
      // data structures & storage
      const STORAGE_MENU_KEY = 'rrb_menu';
      const STORAGE_ORDERS_KEY = 'rrb_orders';

      let menu = [];
      let orders = [];
      let cart = [];
      let currentCustomer = null;

      // init
      function init(){
        loadMenu();
        loadOrders();
        renderMenu();
        bindEvents();
        showCustomerModal();
      }

      function loadMenu(){
        const stored = localStorage.getItem(STORAGE_MENU_KEY);
        if(stored){ menu = JSON.parse(stored); }
        else { // default items
          menu = [
            {id:1,name:'Royal Roll',price:12.99,desc:'Deluxe roll with gold leaf.'},
            {id:2,name:'Buns Supreme',price:9.49,desc:'Classic buns with premium butter.'}
          ];
          localStorage.setItem(STORAGE_MENU_KEY, JSON.stringify(menu));
        }
      }

      function saveMenu(){ localStorage.setItem(STORAGE_MENU_KEY, JSON.stringify(menu)); }

      function loadOrders(){
        const stored = localStorage.getItem(STORAGE_ORDERS_KEY);
        if(stored){ orders = JSON.parse(stored); }
      }

      function saveOrders(){ localStorage.setItem(STORAGE_ORDERS_KEY, JSON.stringify(orders)); }

      // rendering helpers
      function renderMenu(){
        const container = document.getElementById('menu');
        container.innerHTML = '';
        menu.forEach(item => {
          const card = document.createElement('div');
          card.className='menu-item';
          card.innerHTML = `
            <img src="https://via.placeholder.com/300?text=${encodeURIComponent(item.name)}" alt="${item.name}" />
            <div class="name">${item.name}</div>
            <div class="price">$${item.price.toFixed(2)}</div>
            <button data-id="${item.id}">Add</button>
          `;
          container.appendChild(card);
        });
      }

      function renderCart(){
        const itemsDiv = document.getElementById('cartItems');
        itemsDiv.innerHTML = '';
        let total=0;
        cart.forEach(entry=>{
          const item = menu.find(m=>m.id===entry.id);
          const row = document.createElement('div');
          row.className='cart-item';
          row.innerHTML = `
            <div>${item.name}</div>
            <div class="controls">
              <button data-action="dec" data-id="${item.id}">-</button>
              <div class="qty">${entry.qty}</div>
              <button data-action="inc" data-id="${item.id}">+</button>
            </div>
            <div>$${(item.price*entry.qty).toFixed(2)}</div>
          `;
          itemsDiv.appendChild(row);
          total += item.price * entry.qty;
        });
        document.getElementById('cartTotal').textContent = total.toFixed(2);
        document.getElementById('cartCount').textContent = cart.reduce((a,c)=>a+c.qty,0);
      }

      function openCart(){ document.getElementById('cartDrawer').classList.add('open'); }
      function closeCart(){ document.getElementById('cartDrawer').classList.remove('open'); }

      function addToCart(id){
        const existing = cart.find(c=>c.id===id);
        if(existing) existing.qty++;
        else cart.push({id,qty:1});
        renderCart();
      }

      function changeQty(id,delta){
        const entry = cart.find(c=>c.id===id);
        if(!entry) return;
        entry.qty += delta;
        if(entry.qty<=0) cart = cart.filter(c=>c.id!==id);
        renderCart();
      }

      function confirmOrder(){
        if(cart.length===0) return;
        const total = cart.reduce((sum,e)=>{
          const it = menu.find(m=>m.id===e.id);
          return sum + it.price*e.qty;
        },0);
        const order = {
          id: Date.now(),
          table: currentCustomer.table,
          customer: currentCustomer.name,
          items: [...cart],
          total,
          status: 'Pending',
          timestamp: new Date().toISOString()
        };
        orders.push(order);
        saveOrders();
        cart=[];
        renderCart();
        closeCart();
        alert('Order placed!');
        renderDashboard();
      }

      function renderDashboard(){
        const groups = document.querySelectorAll('.order-group');
        groups.forEach(g=> g.innerHTML='');
        orders.forEach(o=>{
          const card = document.createElement('div');
          card.className='order-card';
          card.innerHTML = `
            <div><strong>#${o.id}</strong> ${o.customer} (Table ${o.table}) - $${o.total.toFixed(2)}</div>
            <div>Status: <span>${o.status}</span></div>
            <div class="status-buttons">
              ${['Pending','Preparing','Ready','Completed'].map(s=>`<button data-id="${o.id}" data-status="${s}">${s}</button>`).join('')}
            </div>
          `;
          document.querySelector(`.order-group[data-status="${o.status}"]`).appendChild(card);
        });
      }

      function updateOrderStatus(id,newStatus){
        const ord = orders.find(o=>o.id==id);
        if(ord){ ord.status=newStatus; saveOrders(); renderDashboard(); }
      }

      function renderAdminMenu(){
        const list = document.querySelector('#adminPanel .menu-list');
        list.innerHTML='';
        menu.forEach(it=>{
          const row = document.createElement('div');
          row.className='menu-row';
          row.innerHTML = `<span>${it.name} ($${it.price.toFixed(2)})</span><button data-id="${it.id}">Delete</button>`;
          list.appendChild(row);
        });
      }

      function addMenuItem(){
        const name = document.getElementById('adminItemName').value.trim();
        const price = parseFloat(document.getElementById('adminItemPrice').value);
        const desc = document.getElementById('adminItemDesc').value.trim();
        if(!name||isNaN(price)) return;
        menu.push({ id: Date.now(), name, price, desc });
        saveMenu();
        renderMenu(); renderAdminMenu();
      }

      function deleteMenuItem(id){
        menu = menu.filter(m=>m.id!=id);
        saveMenu();
        renderMenu(); renderAdminMenu();
      }

      function bindEvents(){
        document.getElementById('menu').addEventListener('click', e=>{
          if(e.target.tagName==='BUTTON') addToCart(Number(e.target.dataset.id));
        });
        document.getElementById('cartBtn').addEventListener('click', openCart);
        document.getElementById('cartDrawer').addEventListener('click', e=>{
          if(e.target.dataset.action){ changeQty(Number(e.target.dataset.id), e.target.dataset.action==='inc'?1:-1); }
        });
        document.getElementById('confirmOrderBtn').addEventListener('click', confirmOrder);
        document.getElementById('startOrderBtn').addEventListener('click', ()=>{
          const table = document.getElementById('tableInput').value.trim();
          const name = document.getElementById('nameInput').value.trim();
          if(table && name){ currentCustomer={table,name}; document.getElementById('customerModal').classList.add('hidden'); }
        });
        document.getElementById('viewDashboardBtn').addEventListener('click', ()=>{
          document.getElementById('dashboard').classList.toggle('active'); renderDashboard();
        });
        document.getElementById('viewAdminBtn').addEventListener('click', ()=>{
          document.getElementById('adminPanel').classList.toggle('active'); renderAdminMenu();
        });
        document.getElementById('adminAddBtn').addEventListener('click', addMenuItem);
        document.querySelector('#adminPanel .menu-list').addEventListener('click', e=>{
          if(e.target.tagName==='BUTTON') deleteMenuItem(Number(e.target.dataset.id));
        });
        document.getElementById('dashboard').addEventListener('click', e=>{
          if(e.target.tagName==='BUTTON'){
            updateOrderStatus(Number(e.target.dataset.id), e.target.dataset.status);
          }
        });
      }

      function showCustomerModal(){ document.getElementById('customerModal').classList.remove('hidden'); }

      // initialize app
      init();
    })();
  </script>
